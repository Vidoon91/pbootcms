<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{pboot:pagetitle}</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Noto+Sans+SC:wght@300;400;500;700&amp;display=swap">
    <link rel="stylesheet" href="/skin/css/base.css">
    <link rel="stylesheet" href="/skin/css/topbar.css">
    <link rel="stylesheet" href="/skin/css/sidebar.css">
    <link rel="stylesheet" href="/skin/css/footer.css">
    <link rel="stylesheet" href="/skin/css/mobile-tabbar.css">
    <link rel="stylesheet" href="/skin/css/back-to-top.css">
    <style>
        .member-home-page {
            min-height: 68vh;
            padding: 56px 16px;
            background: #f8fafc;
        }
        .member-home-card {
            max-width: 760px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
            padding: 28px;
        }
        .member-home-head {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .member-home-avatar {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #dbe3ee;
            flex-shrink: 0;
        }
        .member-home-name {
            margin: 0 0 6px;
            color: #0f172a;
            font-size: 1.45rem;
            line-height: 1.3;
        }
        .member-home-group {
            color: #64748b;
            font-size: 0.92rem;
        }
        .member-home-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-top: 24px;
        }
        .member-home-stat {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            background: #fff;
        }
        .member-home-stat span {
            display: block;
            color: #64748b;
            font-size: 0.84rem;
            margin-bottom: 6px;
        }
        .member-home-stat strong {
            color: #0f172a;
            font-size: 1rem;
        }
        @media (max-width: 640px) {
            .member-home-head {
                align-items: flex-start;
                flex-direction: column;
            }
            .member-home-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="sidebar-embedded-page">
{include file=topbar.html}

<div class="main-content-wrapper">
    <div class="sidebar-embedded-aside">
        <!-- SIDEBAR_START -->
        {include file=sidebar.html}
        <!-- SIDEBAR_END -->
    </div>
    <div class="main-container">
        <div class="main-content">
            <main class="member-home-page">
                <section class="member-home-card">
                    <div class="member-home-head">
                        <img class="member-home-avatar" src="{member:headpic}" alt="{member:nickname}">
                        <div>
                            <h1 class="member-home-name">{member:nickname}</h1>
                            <div class="member-home-group">{member:gname}</div>
                        </div>
                    </div>
                    <div class="member-home-grid">
                        <div class="member-home-stat">
                            <span>会员编号</span>
                            <strong>{member:ucode}</strong>
                        </div>
                        <div class="member-home-stat">
                            <span>注册时间</span>
                            <strong>{member:registertime}</strong>
                        </div>
                        <div class="member-home-stat">
                            <span>登录次数</span>
                            <strong>{member:logincount}</strong>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>
</div>

{include file=footer.html}
{include file=mobile_tabbar.html}
{include file=back-to-top.html}

<script src="/skin/js/topbar.js"></script>
<script src="/skin/js/sidebar.js"></script>
<script src="/skin/js/footer.js"></script>
<script src="/skin/js/mobile-tabbar.js"></script>
<script src="/skin/js/back-to-top.js"></script>
<script src="/skin/js/main.js"></script>
</body>
</html>
