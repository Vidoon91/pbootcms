<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{pboot:pagetitle}</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Noto+Sans+SC:wght@300;400;500;700&amp;display=swap">
    <link rel="stylesheet" href="/skin/css/base.css">
    <link rel="stylesheet" href="/skin/css/topbar.css">
    <link rel="stylesheet" href="/skin/css/sidebar.css">
    <link rel="stylesheet" href="/skin/css/footer.css">
    <link rel="stylesheet" href="/skin/css/mobile-tabbar.css">
    <link rel="stylesheet" href="/skin/css/back-to-top.css">
    <style>
        .member-auth-page {
            min-height: 68vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 56px 16px;
            background: #f8fafc;
        }
        .member-auth-card {
            width: 100%;
            max-width: 440px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
            padding: 28px;
        }
        .member-auth-title {
            margin: 0 0 8px;
            color: #0f172a;
            font-size: 1.45rem;
            line-height: 1.3;
        }
        .member-auth-note {
            margin: 0 0 22px;
            color: #64748b;
            font-size: 0.92rem;
        }
        .member-auth-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .member-auth-input {
            width: 100%;
            border: 1px solid #dbe3ee;
            border-radius: 10px;
            padding: 12px 14px;
            font: inherit;
            box-sizing: border-box;
        }
        .member-auth-input:focus {
            outline: none;
            border-color: #1a56db;
            box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.1);
        }
        .member-auth-code {
            display: flex;
            gap: 10px;
        }
        .member-auth-code img {
            width: 104px;
            height: 44px;
            border: 1px solid #dbe3ee;
            border-radius: 10px;
            object-fit: cover;
            cursor: pointer;
            flex-shrink: 0;
        }
        .member-auth-submit {
            border: none;
            border-radius: 999px;
            background: #1a56db;
            color: #fff;
            padding: 12px 16px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
        }
        .member-auth-submit:hover {
            background: #0f4bc2;
        }
        .member-auth-link {
            margin-top: 18px;
            color: #64748b;
            font-size: 0.9rem;
            text-align: center;
        }
        .member-auth-link a {
            color: #1a56db;
            text-decoration: none;
            font-weight: 600;
        }
        @media (max-width: 480px) {
            .member-auth-card {
                padding: 22px;
            }
            .member-auth-code {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body class="sidebar-embedded-page">
<!-- 顶部信息栏 -->
<!-- TOPBAR_START -->
{include file=topbar.html}
<!-- TOPBAR_END -->

<!-- 主导航栏 -->

<!-- 侧边栏导航 -->

<!-- 主内容包装器 -->
<div class="main-content-wrapper">
    <div class="sidebar-embedded-aside">
        <!-- SIDEBAR_START -->
        {include file=sidebar.html}
        <!-- SIDEBAR_END -->
    </div>
    <div class="main-container">
        <div class="main-content">
            <main class="member-auth-page">
                <section class="member-auth-card">
                    <h1 class="member-auth-title">会员注册</h1>
                    <p class="member-auth-note">创建账号后即可登录参与评论。</p>
                    <form class="member-auth-form" method="post" action="">
                        <input class="member-auth-input" type="text" name="username" placeholder="用户名" autocomplete="username" required>
                        <input class="member-auth-input" type="email" name="useremail" placeholder="邮箱" autocomplete="email" required>
                        <input class="member-auth-input" type="tel" name="usermobile" placeholder="手机号" autocomplete="tel" required>
                        <input class="member-auth-input" type="text" name="nickname" placeholder="昵称">
                        <input class="member-auth-input" type="password" name="password" placeholder="密码" autocomplete="new-password" required>
                        <input class="member-auth-input" type="password" name="rpassword" placeholder="确认密码" autocomplete="new-password" required>
                        <div class="member-auth-code">
                            <input class="member-auth-input" type="text" name="checkcode" placeholder="验证码">
                            <img src="{pboot:checkcode}" alt="验证码" title="点击刷新" onclick="this.src='{pboot:checkcode}?'+Math.round(Math.random()*10);">
                        </div>
                        <button class="member-auth-submit" type="submit">注册</button>
                    </form>
                    <div class="member-auth-link">已有账号？<a href="{pboot:login}" id="memberLoginLink">去登录</a></div>
                </section>
            </main>
        </div>
    </div>
</div>

<!--页脚 FOOTER_START -->
{include file=footer.html}
<!-- FOOTER_END -->

<!-- 移动端底部导航MOBILE_TABBAR_START -->
{include file=mobile_tabbar.html}
<!-- MOBILE_TABBAR_END -->

<!-- BACK_TO_TOP_START 返回顶部按钮 -->
{include file=back-to-top.html}
<!-- BACK_TO_TOP_END -->

<script src="/skin/js/topbar.js"></script>
<script src="/skin/js/sidebar.js"></script>
<script src="/skin/js/footer.js"></script>
<script src="/skin/js/mobile-tabbar.js"></script>
<script src="/skin/js/back-to-top.js"></script>
<script src="/skin/js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var backurl = new URLSearchParams(window.location.search).get('backurl');
    var loginLink = document.getElementById('memberLoginLink');
    if (backurl && loginLink) {
        var url = new URL(loginLink.href, window.location.origin);
        url.searchParams.set('backurl', backurl);
        loginLink.href = url.toString();
    }
});
</script>
</body>
</html>
